name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "moodtracker.py"
      - "moodtracker.spec"
      - "build_windows.bat"
      - "installer_windows.iss"
      - "windows_version_info.txt"
      - "README_WINDOWS.md"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller matplotlib

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows exe and installer
        shell: cmd
        run: build_windows.bat -Clean

      - name: Verify outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/MoodTracker.exe")) { throw "No se genero dist/MoodTracker.exe" }
          if (!(Test-Path "MoodTracker-Setup.exe")) { throw "No se genero MoodTracker-Setup.exe" }

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoodTracker-portable-exe
          path: dist/MoodTracker.exe

      - name: Upload standalone installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoodTracker-standalone-installer-exe
          path: MoodTracker-Setup.exe
